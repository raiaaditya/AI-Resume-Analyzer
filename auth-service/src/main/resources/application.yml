server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resumedb}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:adminpassword}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:defaultSecretKeyForJwtTokenGenerationInLocalEnvironmentWhichShouldBeLongEnough}
  expiration: 86400000 # 1 day in ms

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics,info,beans,env,threaddump,heapdump
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http.server.requests: true
        http.client.requests: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
