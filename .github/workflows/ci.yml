name: CI/CD Pipeline

on:
  push:
    branches: 
      - "main"
      - "master"
      - "develop"
    paths-ignore:
      - '*.md'
      - 'docs/**'
  pull_request:
    branches: 
      - "main"
      - "master"
      - "develop"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ========================================
  # BUILD & TEST JOBS
  # ========================================
  build-and-test-java:
    name: Build Java Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, resume-service, api-gateway]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      
      - name: Build ${{ matrix.service }} with Maven
        working-directory: ./${{ matrix.service }}
        run: mvn clean package -DskipTests -q
      
      - name: Run unit tests
        working-directory: ./${{ matrix.service }}
        run: mvn test -q

  build-and-test-python:
    name: Build Python AI Service
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        working-directory: ./ai-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

  build-and-test-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Run linter
        working-directory: ./frontend
        run: npm run lint
      
      - name: Build production bundle
        working-directory: ./frontend
        run: npm run build

  # ========================================
  # DOCKER BUILD & PUSH JOBS
  # ========================================
  build-and-push-docker:
    name: Build & Push Docker Images
    needs: [build-and-test-java, build-and-test-python, build-and-test-frontend]
    if: github.event_name == 'push' && github.ref in ('refs/heads/main', 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
            dockerfile: Dockerfile
          - service: api-gateway
            context: ./api-gateway
            dockerfile: Dockerfile
          - service: auth-service
            context: ./auth-service
            dockerfile: Dockerfile
          - service: resume-service
            context: ./resume-service
            dockerfile: Dockerfile
          - service: ai-service
            context: ./ai-service
            dockerfile: Dockerfile
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for ${{ matrix.service }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest
      
      - name: Build and push ${{ matrix.service }} Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          dockerfile: ${{ matrix.context }}/${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}:buildcache,mode=max

  # ========================================
  # SECURITY & QUALITY CHECKS
  # ========================================
  security-check:
    name: Security & Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ========================================
  # DEPLOYMENT NOTIFICATION
  # ========================================
  notify-deployment:
    name: Deployment Notification
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref in ('refs/heads/main', 'refs/heads/master')
    needs: [build-and-push-docker]
    steps:
      - name: Notify deployment
        run: |
          echo "✅ CI/CD Pipeline completed successfully!"
          echo "📦 Docker images pushed to GitHub Container Registry (GHCR)"
          echo "🚀 Ready for deployment"

